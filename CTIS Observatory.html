<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CTIS Observatory — Design Explorations</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<template id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<rect width="100" height="100" fill="#1A1815"/>
<text x="50" y="58" font-family="Georgia,serif" font-size="32" fill="#E8A876" text-anchor="middle" font-weight="300">Č</text>
<rect x="20" y="72" width="60" height="2" fill="#B4542C"/>
</svg>
</template>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #E6E2D8; font-family: 'Inter', system-ui, sans-serif; }
  
  .shell-header {
    background: #1A1815; color: #F7F4ED; padding: 14px 32px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid #2A2825;
    position: sticky; top: 0; z-index: 100;
  }
  .shell-title { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
  .shell-title span { color: #9A948F; font-weight: 400; margin-left: 10px; }
  .shell-tabs { display: flex; gap: 4px; background: #0F0D0B; padding: 4px; border-radius: 8px; }
  .shell-tab {
    background: transparent; border: none; color: #9A948F;
    padding: 7px 18px; font-size: 12px; cursor: pointer;
    font-family: 'Inter', sans-serif; border-radius: 6px;
    transition: all 0.2s; font-weight: 500;
  }
  .shell-tab:hover { color: #F7F4ED; }
  .shell-tab.active { background: #B4542C; color: #FFF; }
  .shell-meta { font-size: 11px; color: #6B6560; font-variant-numeric: tabular-nums; }
  
  .opt-panel { display: none; }
  .opt-panel.active { display: block; }
</style>
</head>
<body>
  <div class="shell-header">
    <div class="shell-title">CTIS Observatory <span>· Public design explorations</span></div>
    <div class="shell-tabs">
      <button class="shell-tab active" data-opt="a">A · Briefing</button>
      <button class="shell-tab" data-opt="b">B · Scoreboard</button>
      <button class="shell-tab" data-opt="c">C · Story Cards</button>
      <button class="shell-tab" data-opt="d">D · Compare</button>
      <button class="shell-tab" data-opt="e">E · Sponsors</button>
    </div>
    <div class="shell-meta">
      <a href="https://euclinicaltrials.eu/search-for-clinical-trials/?lang=en" target="_blank" rel="noopener" style="color:#E8A876;text-decoration:none;border-bottom:1px dotted #6B6560;padding-bottom:1px;">View on CTIS ↗</a>
      <span style="margin:0 10px;color:#3A3530;">·</span>
      Czechia vs 11 peers · 2022–2025
    </div>
  </div>
  
  <div id="opt-a" class="opt-panel active"></div>
  <div id="opt-b" class="opt-panel"></div>
  <div id="opt-c" class="opt-panel"></div>
  <div id="opt-d" class="opt-panel"></div>
  <div id="opt-e" class="opt-panel"></div>

  <script src="data.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="option_a.jsx"></script>
  <script type="text/babel" src="option_b.jsx"></script>
  <script type="text/babel" src="option_c.jsx"></script>
  <script type="text/babel" src="option_d.jsx"></script>
  <script type="text/babel" src="option_e.jsx"></script>
  <script type="text/babel">
    // Mount each option independently once Babel has loaded them
    const mount = (id, Comp) => {
      const el = document.getElementById(id);
      if (el && Comp) ReactDOM.createRoot(el).render(<Comp />);
    };
    // Poll for availability (Babel scripts load async)
    const tryMount = () => {
      if (window.OptionA && window.OptionB && window.OptionC && window.OptionD && window.OptionE) {
        mount('opt-a', window.OptionA);
        mount('opt-b', window.OptionB);
        mount('opt-c', window.OptionC);
        mount('opt-d', window.OptionD);
        mount('opt-e', window.OptionE);
      } else {
        setTimeout(tryMount, 50);
      }
    };
    tryMount();
    
    // Tab switching
    document.querySelectorAll('.shell-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        const opt = btn.dataset.opt;
        document.querySelectorAll('.shell-tab').forEach(b => b.classList.toggle('active', b === btn));
        document.querySelectorAll('.opt-panel').forEach(p => p.classList.toggle('active', p.id === 'opt-' + opt));
        localStorage.setItem('ctis_opt', opt);
      });
    });
    // Restore last tab
    const saved = localStorage.getItem('ctis_opt');
    if (saved && ['a','b','c','d','e'].includes(saved)) {
      document.querySelector(`.shell-tab[data-opt="${saved}"]`)?.click();
    }
  </script>
</body>
</html>
