# .github/workflows/refresh.yml
# Runs the refresh script every night and commits the result.

name: Refresh CTIS data
on:
  schedule:
    - cron: '0 3 * * *'   # 3 AM UTC every day
  workflow_dispatch:       # also runs on a button click

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: python scripts/refresh_ctis.py
      - name: Commit if changed
        run: |
          git config user.name "ctis-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.live.js
          git diff --staged --quiet || git commit -m "Nightly refresh"
          git push
